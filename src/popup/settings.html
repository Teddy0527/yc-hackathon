<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="settings.css" />
  <title>Silver Assist Settings</title>
</head>
<body>
  <div class="settings-container">
    <div class="header">
      <a href="popup.html" class="back-link">&larr; Back</a>
      <h1 class="title">Settings</h1>
    </div>

    <div class="setting-group">
      <label class="setting-label" for="speech-speed">
        Speech Speed: <span id="speed-value">0.85</span>
      </label>
      <input
        type="range"
        id="speech-speed"
        min="0.5"
        max="1.5"
        step="0.05"
        value="0.85"
      />
      <div class="range-labels">
        <span>Slow</span>
        <span>Fast</span>
      </div>
    </div>

    <div class="setting-group">
      <label class="setting-label" for="voice-select">Voice</label>
      <select id="voice-select">
        <option value="">Auto (default)</option>
      </select>
    </div>

    <button id="save-btn" class="save-btn">Save</button>
    <div id="save-status" class="save-status"></div>
  </div>

  <script src="settings.js"></script>
</body>
</html>
